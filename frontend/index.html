<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareTrace AI - Personalized Health Intelligence</title>
    
    <!-- Premium Global & Regional Font Support -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Kannada:wght@100..900&family=Noto+Sans+Devanagari:wght@100..900&family=Noto+Sans+Tamil:wght@100..900&family=Noto+Sans+Telugu:wght@100..900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      :root {
        font-family: 'Inter', 'Noto Sans', sans-serif;
      }
      /* Script-Specific Font Overrides */
      [lang="te"] { font-family: 'Noto Sans Telugu', sans-serif; }
      [lang="hi"] { font-family: 'Noto Sans Devanagari', sans-serif; }
      [lang="ta"] { font-family: 'Noto Sans Tamil', sans-serif; }
      [lang="kn"] { font-family: 'Noto Sans Kannada', sans-serif; }
      
      body {
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
    <script>
      (function() {
        try {
          const storedTheme = window.localStorage.getItem('theme');
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
          const theme = storedTheme === 'dark' || storedTheme === 'light'
            ? storedTheme
            : (prefersDark ? 'dark' : 'light');

          if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        } catch (error) {
          // Silently ignore if localStorage is unavailable.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
