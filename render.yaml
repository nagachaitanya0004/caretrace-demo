services:
  - type: web
    name: caretrace-backend
    env: python
    buildCommand: "cd caretrace-ai/backend && pip install -r requirements.txt"
    startCommand: "cd caretrace-ai/backend && uvicorn app.main:app --host 0.0.0.0 --port 10000"
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10000
      - key: CORS_ORIGINS
        sync: false
